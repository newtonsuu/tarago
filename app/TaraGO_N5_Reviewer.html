*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
header{padding:18px 20px 8px;text-align:center}
header h1{font-size:1.5rem}
header h1 span{color:var(--acc)}
header p{color:var(--mut);font-size:.85rem;margin-top:4px}
nav{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:12px}
nav button{background:var(--card);color:var(--txt);border:1px solid #2e3765;border-radius:20px;padding:8px 14px;cursor:pointer;font-size:.9rem}
nav button.active{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:600}
main{max-width:860px;margin:0 auto;padding:10px 16px 60px}
.panel{display:none}.panel.show{display:block}
.card{background:var(--card);border:1px solid #2e3765;border-radius:14px;padding:18px;margin-bottom:14px}
.big{font-size:4.5rem;text-align:center;line-height:1.2;font-family:'Yu Gothic','Meiryo','Hiragino Sans',sans-serif}
.mid{font-size:1.6rem;text-align:center;font-family:'Yu Gothic','Meiryo',sans-serif}
.muted{color:var(--mut)} .center{text-align:center}
.btnrow{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px}
button.b{background:var(--card2);color:var(--txt);border:1px solid #3a4478;border-radius:10px;padding:10px 18px;cursor:pointer;font-size:.95rem}
button.b:hover{border-color:var(--acc2)}
button.good{background:#1d4030;border-color:var(--ok)} button.again{background:#46202c;border-color:var(--acc)}
.stat{display:flex;gap:14px;justify-content:center;color:var(--mut);font-size:.85rem;margin:8px 0}
table{width:100%;border-collapse:collapse;font-size:.95rem}
th,td{padding:7px 9px;border-bottom:1px solid #2e3765;text-align:left;vertical-align:top}
th{color:var(--acc2);position:sticky;top:0;background:var(--card)}
td.jp{font-family:'Yu Gothic','Meiryo',sans-serif;font-size:1.15rem}
.tag{display:inline-block;background:var(--card2);border-radius:8px;padding:1px 8px;font-size:.75rem;color:var(--gold);margin-left:6px}
input[type=text]{width:100%;padding:10px;border-radius:10px;border:1px solid #3a4478;background:var(--card2);color:var(--txt);font-size:1rem}
.opt{display:block;width:100%;text-align:left;margin:6px 0;padding:12px;border-radius:10px;border:1px solid #3a4478;background:var(--card2);color:var(--txt);cursor:pointer;font-size:1rem}
.opt.correct{background:#1d4030;border-color:var(--ok)} .opt.wrong{background:#46202c;border-color:var(--acc)}
.gpoint h3{color:var(--acc2);margin-bottom:4px;font-size:1.05rem}
.gpoint .ex{font-family:'Yu Gothic','Meiryo',sans-serif;margin-top:6px}
.gpoint .tr{color:var(--mut);font-size:.88rem}
canvas{background:#fff;border-radius:12px;touch-action:none;display:block;margin:0 auto}
.kanaGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:6px}
.kanaCell{background:var(--card2);border-radius:10px;padding:8px 4px;text-align:center}
.kanaCell .k{font-size:1.4rem;font-family:'Yu Gothic',sans-serif}
.kanaCell .r{font-size:.7rem;color:var(--mut)}
.pill{background:var(--card2);border:1px solid #3a4478;border-radius:10px;padding:6px 10px;color:var(--txt);cursor:pointer;font-size:.85rem}
.pill.active{background:var(--acc2);color:#08222a;font-weight:600}
.writeRef{font-size:7rem;text-align:center;color:#233;font-family:'Yu Gothic',sans-serif;line-height:1.1}
progress{width:100%;height:10px}
.notice{font-size:.8rem;color:var(--mut);margin-top:8px;text-align:center}
</style>

let store={};
try{store=JSON.parse(localStorage.getItem("taragoN5")||"{}")}catch(e){store={}}
function saveStore(){try{localStorage.setItem("taragoN5",JSON.stringify(store))}catch(e){}}
function itemKey(t,i){return t+":"+i}
function due(t,i){const s=store[itemKey(t,i)];return !s||s.due<=Date.now()}
function grade(t,i,ok){
  const k=itemKey(t,i);const s=store[k]||{iv:0,due:0};
  s.iv=ok?(s.iv===0?1:Math.round(s.iv*2.3)):0;
  const mins=s.iv===0?1:s.iv*1440;
  s.due=Date.now()+mins*60000;store[k]=s;saveStore();
}

let fMode="kanji",fIdx=-1,fFlip=false;
function pool(){return fMode==="kanji"?KANJI:VOCAB}
function nextCard(){
  const p=pool();const dues=[];for(let i=0;i<p.length;i++)if(due(fMode,i))dues.push(i);
  fIdx=dues.length?dues[Math.floor(Math.random()*dues.length)]:Math.floor(Math.random()*p.length);
  fFlip=false;renderFlash(dues.length);
}
function renderFlash(dueCount){
  const el=document.getElementById("p-flash");const p=pool();
  if(fIdx<0){nextCard();return}
  const it=p[fIdx];
  const front=fMode==="kanji"?it[0]:it[0];
  const back=fMode==="kanji"?`<div class="mid">${it[3]}</div><p class="center muted">on: ${it[1]} &nbsp; kun: ${it[2]}</p>`
    :`<div class="mid">${it[2]}</div><p class="center muted">${it[1]} <span class="tag">${it[3]}</span></p>`;
  el.innerHTML=`
  <div class="btnrow">
    <button class="pill ${fMode==="kanji"?"active":""}" onclick="fMode='kanji';fIdx=-1;renderFlash()">Kanji (${KANJI.length})</button>
    <button class="pill ${fMode==="vocab"?"active":""}" onclick="fMode='vocab';fIdx=-1;renderFlash()">Vocabulary (${VOCAB.length})</button>
  </div>
  <div class="stat">${dueCount!==undefined?`Due now: ${dueCount}`:""}&nbsp; Spaced repetition: “Again” = see it soon · “Got it” = interval grows</div>
  <div class="card" style="min-height:230px;cursor:pointer" onclick="fFlip=!fFlip;renderFlash()">
    <div class="big">${front}</div>
    ${fFlip?back:'<p class="center muted">tap card to flip</p>'}
  </div>
  <div class="btnrow">
    <button class="b" onclick="speakJa('${(fMode==="kanji"?it[0]:it[0]).replace(/'/g,"")}')">🔊 Listen</button>
    <button class="b again" onclick="grade(fMode,fIdx,false);nextCard()">↻ Again</button>
    <button class="b good" onclick="grade(fMode,fIdx,true);nextCard()">✓ Got it</button>
  </div>`;
}

/* ================= QUIZ ================= */
let q={},qScore=0,qTotal=0;
function newQuiz(){
  const type=Math.random()<0.5?"kanji":"vocab";
  const p=type==="kanji"?KANJI:VOCAB;
  const i=Math.floor(Math.random()*p.length);
  const correct=type==="kanji"?p[i][3]:p[i][2];
  const opts=new Set([correct]);
  while(opts.size<4){const j=Math.floor(Math.random()*p.length);opts.add(type==="kanji"?p[j][3]:p[j][2])}
  q={prompt:p[i][0],sub:type==="kanji"?"What does this kanji mean?":"Reading: "+p[i][1]+" — what does it mean?",correct,opts:[...opts].sort(()=>Math.random()-0.5),done:false};
  const el=document.getElementById("p-quiz");
  el.innerHTML=`<div class="stat">Score: ${qScore}/${qTotal}</div>
  <div class="card"><p class="center muted">${q.sub}</p><div class="big">${q.prompt}</div></div>
  ${q.opts.map(o=>`<button class="opt" onclick="answer(this,'${o.replace(/'/g,"\\'")}')">${o}</button>`).join("")}
  <div class="btnrow"><button class="b" onclick="newQuiz()">Skip →</button></div>`;
}
function answer(btn,val){
  if(q.done)return;q.done=true;qTotal++;
  document.querySelectorAll(".opt").forEach(b=>{if(b.textContent===q.correct)b.classList.add("correct")});
  if(val===q.correct){qScore++;}else{btn.classList.add("wrong")}
  setTimeout(newQuiz,900);
}

renderSpeak();
function speakJa(text,rate=1){
  try{
    const u=new SpeechSynthesisUtterance(text);u.lang="ja-JP";u.rate=rate;
    const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith("ja"));if(v)u.voice=v;
    speechSynthesis.cancel();speechSynthesis.speak(u);
  }catch(e){}
}
function recSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const out=document.getElementById("recOut");
  if(!SR){out.textContent="Speech recognition is not supported in this browser — try Chrome/Edge.";return}
  const r=new SR();r.lang="ja-JP";r.interimResults=false;
  out.textContent="Listening… speak now!";
  r.onresult=e=>{
    const heard=e.results[0][0].transcript;
    const target=SPEAK_SENTS[sIdx][0].replace(/[。、!?]/g,"");
    const match=heard.replace(/[。、]/g,"")===target;
    out.innerHTML=`Heard: <b>${heard}</b> ${match?"— ✅ perfect match!":"— keep practicing, compare with the target."}`;
  };
  r.onerror=()=>{out.textContent="Could not hear you — check mic permission."};
  r.start();
}

let wIdx=0,ctx=null,drawing=false;
function initCanvas(){
  const el=document.getElementById("p-write");
  if(!el.dataset.init){
    el.dataset.init="1";
    el.innerHTML=`
    <div class="card">
      <p class="center muted">Handwriting practice — trace the gray kanji, then draw it from memory. Writing by hand builds stronger character memory than typing (Longcamp et al., 2005).</p>
      <div style="position:relative;width:280px;margin:10px auto">
        <div class="writeRef" id="wRef" style="position:absolute;inset:0;pointer-events:none;color:#d8dce6"></div>
        <canvas id="wCan" width="280" height="280" style="position:relative;background:transparent;border:2px dashed #3a4478;border-radius:12px"></canvas>
      </div>
      <p class="center" id="wInfo" style="margin-top:6px"></p>
      <div class="btnrow">
        <button class="b" onclick="wClear()">🧹 Clear</button>
        <button class="b" onclick="wTrace=!wTrace;wShow()">👁 Toggle guide</button>
        <button class="b" onclick="speakJa(KANJI[wIdx][0])">🔊</button>
        <button class="b" onclick="wIdx=(wIdx-1+KANJI.length)%KANJI.length;wShow()">← Prev</button>
        <button class="b" onclick="wIdx=(wIdx+1)%KANJI.length;wShow()">Next →</button>
      </div>
    </div>`;
    const c=document.getElementById("wCan");ctx=c.getContext("2d");
    ctx.lineWidth=8;ctx.lineCap="round";ctx.strokeStyle="#4dd0e1";
    const pos=e=>{const r=c.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return[t.clientX-r.left,t.clientY-r.top]};
    const start=e=>{drawing=true;const[x,y]=pos(e);ctx.beginPath();ctx.moveTo(x,y);e.preventDefault()};
    const move=e=>{if(!drawing)return;const[x,y]=pos(e);ctx.lineTo(x,y);ctx.stroke();e.preventDefault()};
    const end=()=>{drawing=false};
    c.addEventListener("mousedown",start);c.addEventListener("mousemove",move);window.addEventListener("mouseup",end);
    c.addEventListener("touchstart",start);c.addEventListener("touchmove",move);c.addEventListener("touchend",end);
  }
  wShow();
}
let wTrace=true;
function wShow(){
  const k=KANJI[wIdx];
  document.getElementById("wRef").textContent=wTrace?k[0]:"";
  document.getElementById("wRef").style.color="#d8dce6";
  document.getElementById("wInfo").innerHTML=`<b>${k[0]}</b> — ${k[3]} <span class="muted">(on: ${k[1]} / kun: ${k[2]})</span>`;
  wClear();
}
function wClear(){if(ctx)ctx.clearRect(0,0,280,280)}

/* boot */
document.querySelector("nav button").click();
if(speechSynthesis)speechSynthesis.getVoices();
</script>
