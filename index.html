<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaraGO — N5/N4 Reviewer</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#fdf8f6">
<style>
:root{--bg:#fdf8f6;--card:#ffffff;--card2:#fbeef0;--acc:#e35d75;--acc2:#2ea8b5;--gold:#c9950c;--txt:#2b2330;--mut:#8a7f8d;--ok:#3aa06a;--spring:cubic-bezier(.34,1.56,.64,1);}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;color:var(--txt);min-height:100vh;
  background:radial-gradient(1100px 500px at 85% -10%, #fde3ea 0%, transparent 60%),
             radial-gradient(900px 500px at -10% 30%, #e3f2f4 0%, transparent 55%),
             var(--bg);background-attachment:fixed}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes popIn{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 #2ea8b533}50%{box-shadow:0 0 0 12px #2ea8b500}}
@keyframes flame{0%,100%{transform:scale(1) rotate(-3deg)}50%{transform:scale(1.15) rotate(3deg)}}
@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
.panel.show{animation:fadeUp .35s var(--spring)}
.card{animation:fadeUp .35s var(--spring)}
button{transition:transform .15s var(--spring),filter .15s}
button:active{transform:scale(.94)}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
header{padding:18px 20px 8px;text-align:center}
header h1{font-size:1.5rem}
header h1 span{color:var(--acc)}
header p{color:var(--mut);font-size:.85rem;margin-top:4px}
nav{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:12px}
nav button{background:var(--card);color:var(--txt);border:1px solid #f0d4da;border-radius:20px;padding:8px 14px;cursor:pointer;font-size:.9rem}
nav button.active{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:600}
main{max-width:860px;margin:0 auto;padding:10px 16px 60px}
.panel{display:none}.panel.show{display:block}
.card{background:var(--card);border:1px solid #f0d4da;border-radius:14px;padding:18px;margin-bottom:14px}
.big{font-size:4.5rem;text-align:center;line-height:1.2;font-family:'Yu Gothic','Meiryo','Hiragino Sans',sans-serif}
.mid{font-size:1.6rem;text-align:center;font-family:'Yu Gothic','Meiryo',sans-serif}
.muted{color:var(--mut)} .center{text-align:center}
.btnrow{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px}
button.b{background:var(--card2);color:var(--txt);border:1px solid #e6c3cb;border-radius:10px;padding:10px 18px;cursor:pointer;font-size:.95rem}
button.b:hover{border-color:var(--acc2)}
button.good{background:#e2f5e9;border-color:var(--ok)} button.again{background:#fde3e3;border-color:var(--acc)}
.stat{display:flex;gap:14px;justify-content:center;color:var(--mut);font-size:.85rem;margin:8px 0}
table{width:100%;border-collapse:collapse;font-size:.95rem}
th,td{padding:7px 9px;border-bottom:1px solid #f0d4da;text-align:left;vertical-align:top}
th{color:var(--acc2);position:sticky;top:0;background:var(--card)}
td.jp{font-family:'Yu Gothic','Meiryo',sans-serif;font-size:1.15rem}
.tag{display:inline-block;background:var(--card2);border-radius:8px;padding:1px 8px;font-size:.75rem;color:var(--gold);margin-left:6px}
input[type=text]{width:100%;padding:10px;border-radius:10px;border:1px solid #e6c3cb;background:var(--card2);color:var(--txt);font-size:1rem}
.opt{display:block;width:100%;text-align:left;margin:6px 0;padding:12px;border-radius:10px;border:1px solid #e6c3cb;background:var(--card2);color:var(--txt);cursor:pointer;font-size:1rem}
.opt.correct{background:#e2f5e9;border-color:var(--ok)} .opt.wrong{background:#fde3e3;border-color:var(--acc)}
.gpoint h3{color:var(--acc2);margin-bottom:4px;font-size:1.05rem}
.gpoint .ex{font-family:'Yu Gothic','Meiryo',sans-serif;margin-top:6px}
.gpoint .tr{color:var(--mut);font-size:.88rem}
canvas{background:#fff;border-radius:12px;touch-action:none;display:block;margin:0 auto}
.kanaGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:6px}
.kanaCell{background:var(--card2);border-radius:10px;padding:8px 4px;text-align:center}
.kanaCell .k{font-size:1.4rem;font-family:'Yu Gothic',sans-serif}
.kanaCell .r{font-size:.7rem;color:var(--mut)}
.pill{background:var(--card2);border:1px solid #e6c3cb;border-radius:10px;padding:6px 10px;color:var(--txt);cursor:pointer;font-size:.85rem}
.pill.active{background:var(--acc2);color:#ffffff;font-weight:600}
.writeRef{font-size:7rem;text-align:center;color:#233;font-family:'Yu Gothic',sans-serif;line-height:1.1}
progress{width:100%;height:10px}
.notice{font-size:.8rem;color:var(--mut);margin-top:8px;text-align:center}
/* ---- Learn path ---- */
#statbar{display:flex;gap:14px;justify-content:center;align-items:center;padding:6px;font-size:.95rem;position:sticky;top:0;z-index:20}
#statbar span{background:#ffffffcc;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid #f2ccd4aa;border-radius:12px;padding:4px 12px}
#statbar span:first-child{animation:flame 2.4s ease-in-out infinite;display:inline-block}
.nodeWrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.nodeWrap:nth-child(odd){transform:translateX(-60px)}
.nodeWrap:nth-child(even){transform:translateX(60px)}
.uTheme{font-size:.68rem;color:var(--mut);max-width:130px;text-align:center;line-height:1.25}
.node:hover:not(.lock){transform:translateY(-4px) scale(1.06);filter:brightness(1.15)}
.node{transition:transform .2s var(--spring),filter .2s}
.node.open{animation:pulse 2s infinite}
.node.done .ico{animation:popIn .4s var(--spring)}
.lvlHead{display:flex;align-items:center;gap:10px;margin:22px 0 10px}
.lvlHead h2{font-size:1.1rem;color:var(--gold)}
.lvlHead .bar{flex:1;height:8px;background:var(--card);border-radius:6px;overflow:hidden}
.lvlHead .bar i{display:block;height:100%;background:var(--acc2)}
.path{display:flex;flex-direction:column;align-items:center;gap:18px;padding:6px 0}
.node{width:84px;height:84px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;border:none;color:var(--txt);font-size:.72rem;background:var(--card2)}
.node .ico{font-size:1.6rem}
.node.done{background:#e2f5e9;border:3px solid var(--ok)}
.node.open{background:var(--card2);border:3px solid var(--acc2);box-shadow:0 0 18px #2ea8b533}
.node.lock{opacity:.45;cursor:not-allowed}
.node .ring{position:absolute;inset:-8px;border-radius:50%;pointer-events:none}
/* ---- lesson ---- */
.lessonTop{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.lessonTop .bar{flex:1;height:14px;background:var(--card);border-radius:8px;overflow:hidden}
.lessonTop .bar i{display:block;height:100%;background:var(--ok);transition:width .3s}
.bank{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:12px 0}
.bank button{background:var(--card2);border:1px solid #e6c3cb;border-radius:10px;color:var(--txt);padding:8px 12px;cursor:pointer;font-size:1rem}
.bank button.used{opacity:.25;pointer-events:none}
.answerLine{min-height:46px;border-bottom:2px solid #e6c3cb;display:flex;flex-wrap:wrap;gap:8px;padding:6px;justify-content:center;margin:10px 0}
.answerLine button{background:var(--acc2);color:#ffffff;border:none;border-radius:10px;padding:8px 12px;cursor:pointer;font-size:1rem}
.pairCols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.pairCols button{padding:14px;border-radius:12px;border:1px solid #e6c3cb;background:var(--card2);color:var(--txt);cursor:pointer;font-size:1.05rem}
.pairCols button.sel{border-color:var(--gold);background:#fdf3d8}
.pairCols button.done{opacity:.3;pointer-events:none}
.pairCols button.err{border-color:var(--acc);background:#fde3e3}
.xpPop{text-align:center;font-size:2rem;color:var(--gold);margin:20px 0}
/* ---- AI ---- */
.chat{display:flex;flex-direction:column;gap:10px;max-height:52vh;overflow-y:auto;padding:4px}
.msg{padding:10px 14px;border-radius:14px;max-width:85%;line-height:1.5;font-size:.95rem;white-space:pre-wrap}
.msg.user{background:var(--acc);color:#fff;align-self:flex-end}
.msg.ai{background:var(--card2);align-self:flex-start}
.chatIn{display:flex;gap:8px;margin-top:10px}
.chatIn input{flex:1}
</style>
</head>

let L={};
function shuffle(a){return [...a].sort(()=>Math.random()-0.5)}
function startLesson(uid){
  const u=ALL_UNITS.find(x=>x.id===uid);
  const ex=[];
  const vpool=u.vocab.length?u.vocab:VOCAB;
  const kpool=u.kanji.length?u.kanji:KANJI;
  shuffle(vpool).slice(0,2).forEach(v=>ex.push({t:"vmcq",v}));
  shuffle(vpool).slice(0,2).forEach(v=>ex.push({t:"vmcq_r",v}));
  shuffle(vpool).slice(0,2).forEach(v=>ex.push({t:"listen",v}));
  shuffle(kpool).slice(0,2).forEach(k=>ex.push({t:"kmcq",k}));
  if(vpool.length>=4)ex.push({t:"pairs",set:shuffle(vpool).slice(0,4)});
  shuffle(u.gram.length?u.gram:GRAMMAR).slice(0,2).forEach(g=>ex.push({t:"order",g}));
  L={u,ex:shuffle(ex),i:0,wrong:[],xp:0,inRetry:false,combo:0};

  L.ex.push({t:"vmcq",v:shuffle(vpool)[0],easy:true});

  const el=document.getElementById("p-learn");
  let item;
  if(L.i<L.ex.length)item=L.ex[L.i];
  else if(L.wrong.length){item=L.wrong.shift();L.retryItem=true}
  else{lessonDone();return}
  L.cur=item;L.locked=false;
  const mk=(prompt,sub,opts,correct,audio)=>{
    el.innerHTML=lessonBar()+
    `<div class="card"><p class="center muted">${sub}</p><div class="${prompt.length>4?"mid":"big"}">${prompt}</div>
     ${audio?`<div class="btnrow"><button class="b" onclick="speakJa('${audio}')">🔊</button></div>`:""}</div>`+
    shuffle(opts).map(o=>`<button class="opt" onclick="lessonAns(this,\`${o}\`,\`${correct}\`)">${o}</button>`).join("");
    if(audio)setTimeout(()=>speakJa(audio),300);
  };
  const optN=(store.diff||"hard")==="hard"?6:4;
  const ALLV=VOCAB.concat(VOCAB4,VOCAB3,VOCAB2,VOCAB1);
  // fillers: same-category first (confusable), then same-pool, then anywhere
  const fillers=(v,n,key)=>{
    const notSame=x=>x[key]!==v[key];
    const sameCat=shuffle(ALLV.filter(x=>x[3]===v[3]&&notSame(x)));
    const rest=shuffle(ALLV.filter(x=>x[3]!==v[3]&&notSame(x)));
    return [...sameCat,...rest].slice(0,n);
  };
  if(item.t==="vmcq"){
    const d=fillers(item.v,optN-1,2).map(v=>v[2]);
    mk(item.v[0],"What does this mean?",[item.v[2],...d],item.v[2]);
  }else if(item.t==="vmcq_r"){
    const d=fillers(item.v,optN-1,0).map(v=>jpDisp(v));
    mk(item.v[2],"Which is the Japanese?",[jpDisp(item.v),...d],jpDisp(item.v));
  }else if(item.t==="listen"){
    if((store.diff||"hard")==="hard"){
      // hard: pick what you HEARD among similar Japanese words
      const d=fillers(item.v,optN-1,0).map(v=>jpDisp(v));
      mk("🔊","What did you hear?",[jpDisp(item.v),...d],jpDisp(item.v),item.v[0]);
    }else{
      const d=fillers(item.v,optN-1,2).map(v=>v[2]);
      mk("🔊","What did you hear?",[item.v[2],...d],item.v[2],item.v[0]);
    }
  }else if(item.t==="kmcq"){
    const pool=KANJI.concat(KANJI4,KANJI3,KANJI2,KANJI1);
    const d=shuffle(pool).filter(k=>k[3]!==item.k[3]).slice(0,optN-1).map(k=>k[3]);
    mk(item.k[0],"What does this kanji mean?",[item.k[3],...d],item.k[3]);
  }else if(item.t==="pairs"){
    lessonPairs(item);
  }else if(item.t==="order"){
    lessonOrder(item);
  }
}
function lessonAns(btn,val,correct){
  if(L.locked)return;L.locked=true;
  document.querySelectorAll(".opt").forEach(b=>{if(b.textContent===correct)b.classList.add("correct")});
  const key=itemKey2(L.cur);
  if(val===correct){
    L.combo=(L.combo||0)+1;
    const bonus=10+Math.min(L.combo-1,5)*2; // combo multiplier caps at +10
    L.xp+=bonus;addXP(bonus);
    if(key)clearWeak(key);
    if(L.cur.t==="listen")questBump("listens");
  }else{
    L.combo=0;btn.classList.add("wrong");
    if(key)markWeak(key);
    if(!L.retryItem)L.wrong.push(L.cur);
  }
  L.retryItem=false;
  setTimeout(()=>{L.i++;lessonQ()},1000);
}
function lessonPairs(item){
  const el=document.getElementById("p-learn");
  const left=shuffle(item.set),right=shuffle(item.set);
  el.innerHTML=lessonBar()+`<div class="card"><p class="center muted">Match the pairs</p>
  <div class="pairCols">
    <div>${left.map(v=>`<button style="width:100%;margin-bottom:8px" data-k="${v[0]}" onclick="pairPick(this,'L')">${v[0]}</button>`).join("")}</div>
    <div>${right.map(v=>`<button style="width:100%;margin-bottom:8px" data-k="${v[0]}" onclick="pairPick(this,'R')">${v[2]}</button>`).join("")}</div>
  </div></div>`;
  L.pairSel={};L.pairLeft=item.set.length;
}
function pairPick(btn,side){
  if(L.pairSel[side]){L.pairSel[side].classList.remove("sel")}
  L.pairSel[side]=btn;btn.classList.add("sel");
  const o=side==="L"?"R":"L";
  if(L.pairSel[o]){
    const a=L.pairSel.L,b=L.pairSel.R;
    if(a.dataset.k===b.dataset.k){
      a.classList.add("done");b.classList.add("done");L.xp+=5;addXP(5);
      if(--L.pairLeft===0){setTimeout(()=>{L.i++;lessonQ()},600)}
    }else{
      a.classList.add("err");b.classList.add("err");
      setTimeout(()=>{a.classList.remove("err");b.classList.remove("err")},500);
    }
    a.classList.remove("sel");b.classList.remove("sel");L.pairSel={};
  }
}
function lessonOrder(item){
  const el=document.getElementById("p-learn");
  const words=item.g[3].split("—")[0].trim().replace(/[.,!?]/g,"").split(/\s+/);
  L.orderTarget=words.join(" ");L.orderPicked=[];
  const hardO=(store.diff||"hard")==="hard";
  el.innerHTML=lessonBar()+`<div class="card">
    <p class="center muted">Arrange the romaji to match what you hear</p>
    ${hardO?'<p class="center big">🔊</p>':`<p class="mid">${item.g[2]}</p>`}
    <div class="btnrow"><button class="b" onclick="speakJa('${item.g[2].replace(/'/g,"")}')">🔊</button></div>
    <div class="answerLine" id="ansLine"></div>
    <div class="bank" id="bank">${shuffle(words).map((w,i)=>`<button id="bw${i}" onclick="orderPick(this,'${w.replace(/'/g,"\\'")}')">${w}</button>`).join("")}</div>
    <div class="btnrow"><button class="b good" onclick="orderCheck()">Check</button></div>
    <p class="center muted" style="font-size:.8rem;margin-top:6px">${item.g[0]} — ${item.g[1]}</p></div>`;
  setTimeout(()=>speakJa(item.g[2]),300);
}
function orderPick(btn,w){
  btn.classList.add("used");L.orderPicked.push({w,btn});
  const line=document.getElementById("ansLine");
  const b=document.createElement("button");b.textContent=w;
  b.onclick=()=>{line.removeChild(b);btn.classList.remove("used");L.orderPicked=L.orderPicked.filter(p=>p.btn!==btn)};
  line.appendChild(b);
}
function orderCheck(){
  const got=L.orderPicked.map(p=>p.w).join(" ");
  const ok=got.toLowerCase()===L.orderTarget.toLowerCase();
  if(ok){L.combo=(L.combo||0)+1;L.xp+=15;addXP(15)}else{L.combo=0;if(!L.retryItem)L.wrong.push(L.cur)}
  L.retryItem=false;
  const el=document.getElementById("ansLine");
  el.style.borderColor=ok?"var(--ok)":"var(--acc)";
  setTimeout(()=>{L.i++;lessonQ()},ok?700:1400);

}
function confetti(){
  const em=["🎉","🌸","⭐","🎊","🇯🇵","🇵🇭","✨"];
  for(let i=0;i<26;i++){
    const s=document.createElement("div");

async function aiSend(){

  if(!text)return;
  if(!store.aiKey){aiHist.push({role:"assistant",content:"Please paste and save an Anthropic API key above first, then try again."});renderAI();return}
  aiHist.push({role:"user",content:text});inp.value="";renderAI();

      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:800,
        system:"You are AI Sensei inside TaraGO, a Japanese-learning app for Filipino jobseekers heading to Japan (JLPT N5–N1, SSW and engineer visa tracks). Be warm, concise, and practical. Use romaji plus kana/kanji. Explain at the learner's level; default to N5–N4 unless they show higher ability. Occasionally use Filipino (Taglish) to clarify tricky points.",
        messages:aiHist.slice(0,-1).slice(-12)})
    });
    const data=await res.json();
    aiHist[aiHist.length-1]={role:"assistant",content:data.content?data.content.map(c=>c.text||"").join(""):(data.error?("Error: "+data.error.message):"No response")};
  }catch(e){aiHist[aiHist.length-1]={role:"assistant",content:"Network error: "+e.message}}
  renderAI();
}

let fMode="kanji",fIdx=-1,fFlip=false;

let q={},qScore=0,qTotal=0;
function newQuiz(){
  const r=Math.random();const type=r<0.34?"kanji":r<0.6?"kanji4":"vocab";
  const p=type==="kanji"?KANJI:type==="kanji4"?KANJI4:VOCAB;
  const isK=type!=="vocab";
  const i=Math.floor(Math.random()*p.length);
  const correct=isK?p[i][3]:p[i][2];
  const opts=new Set([correct]);
  while(opts.size<4){const j=Math.floor(Math.random()*p.length);opts.add(isK?p[j][3]:p[j][2])}
  q={prompt:p[i][0],sub:isK?`What does this ${type==="kanji4"?"N4":"N5"} kanji mean?`:"Reading: "+p[i][1]+" — what does it mean?",correct,opts:[...opts].sort(()=>Math.random()-0.5),done:false};
  const el=document.getElementById("p-quiz");
  el.innerHTML=`<div class="stat">Score: ${qScore}/${qTotal}</div>
  <div class="card"><p class="center muted">${q.sub}</p><div class="big">${q.prompt}</div></div>
  ${q.opts.map(o=>`<button class="opt" onclick="answer(this,'${o.replace(/'/g,"\\'")}')">${o}</button>`).join("")}

  if(val===q.correct){qScore++;}else{btn.classList.add("wrong")}
  setTimeout(newQuiz,900);
}

const SECNAMES={SV:"Script & Vocabulary",CE:"Conversation & Expression",LC:"Listening",RC:"Reading"};
let mQ=[],mI=0,mScore={},mDone=false;
function mockHome(){
  document.getElementById("p-mock").innerHTML=`
  <div class="card center">
    <h3 style="color:var(--acc2);margin-bottom:8px">JFT-Basic Style Mock Exam</h3>
    <p class="muted">${MOCK.length} questions · 4 sections · JFT-Basic format.</p>
    <p class="muted" style="margin-top:6px">Pass zone: 80%+.</p>
    <div class="btnrow"><button class="b good" onclick="mockStart()">Start exam →</button></div>
  </div>`;
}
function mockStart(){mQ=[...MOCK];mI=0;mScore={};mDone=false;mockQ()}
function mockQ(){
  if(mI>=mQ.length){mockResult();return}
  const it=mQ[mI];
  document.getElementById("p-mock").innerHTML=`
  <div class="stat">Question ${mI+1}/${mQ.length} — <span style="color:var(--gold)">${SECNAMES[it.sec]}</span></div>
  <div class="card"><p style="font-size:1.1rem;line-height:1.6">${it.q}</p>
  ${it.audio?`<div class="btnrow"><button class="b" onclick="speakJa('${it.audio}')">🔊 Play audio</button><button class="b" onclick="speakJa('${it.audio}',0.75)">🐢 Slow</button></div>`:""}
  </div>
  ${it.opts.map((o,i)=>`<button class="opt" onclick="mockAns(this,${i})">${o}</button>`).join("")}`;
  if(it.audio)setTimeout(()=>speakJa(it.audio),400);
}
function mockAns(btn,i){
  if(mDone)return;mDone=true;
  const it=mQ[mI];
  mScore[it.sec]=mScore[it.sec]||{ok:0,n:0};mScore[it.sec].n++;
  document.querySelectorAll(".opt").forEach((b,j)=>{if(j===it.a)b.classList.add("correct")});
  if(i===it.a){mScore[it.sec].ok++}else{btn.classList.add("wrong")}
  setTimeout(()=>{mI++;mDone=false;mockQ()},1100);
}
function mockResult(){
  const tot=Object.values(mScore).reduce((a,s)=>a+s.ok,0),n=Object.values(mScore).reduce((a,s)=>a+s.n,0);
  const pct=Math.round(100*tot/n);
  if(pct>=80){store.mockPass=1;saveStore();checkBadges()}
  document.getElementById("p-mock").innerHTML=`
  <div class="card center">
    <h3 style="color:var(--acc2)">Result: ${tot}/${n} (${pct}%)</h3>
    <p style="margin:8px 0;color:${pct>=80?"var(--ok)":pct>=60?"var(--gold)":"var(--acc)"}">${pct>=80?"✅ Pass zone — you'd likely clear JFT-Basic. Book the real test!":pct>=60?"🟡 Close — drill your weakest section below for a week, then retake.":"🔴 Not yet — go back to the 12-week plan and rebuild the weak areas."}</p>
    ${Object.entries(mScore).map(([s,v])=>`<p>${SECNAMES[s]}: ${v.ok}/${v.n}</p>`).join("")}
    <div class="btnrow"><button class="b good" onclick="mockStart()">Retake</button><button class="b" onclick="mockHome()">Back</button></div>
  </div>`;
}

const GOOD_VOICES=["Nanami","Keita","Kyoko","Otoya","O-Ren","Google 日本語","Hattori","Ichiro","Sayaka"];
function jaVoices(){return (speechSynthesis.getVoices()||[]).filter(v=>v.lang&&v.lang.startsWith("ja"))}
function bestVoice(){
  const vs=jaVoices();if(!vs.length)return null;
  if(store.voiceName){const m=vs.find(v=>v.name===store.voiceName);if(m)return m}
  for(const g of GOOD_VOICES){const m=vs.find(v=>v.name.includes(g));if(m)return m}
  return vs.find(v=>/natural|neural|online/i.test(v.name))||vs[0];
}
function speakJa(text,rate){
  try{
    const u=new SpeechSynthesisUtterance(text);u.lang="ja-JP";
    u.rate=(rate||store.rate||0.92)*(0.97+Math.random()*0.06); // slight human variation
    u.pitch=0.98+Math.random()*0.06;
    const v=bestVoice();if(v)u.voice=v;
    speechSynthesis.cancel();speechSynthesis.speak(u);
  }catch(e){}
}
/* ---- kana → romaji ---- */
const ROMA={きゃ:"kya",きゅ:"kyu",きょ:"kyo",しゃ:"sha",しゅ:"shu",しょ:"sho",ちゃ:"cha",ちゅ:"chu",ちょ:"cho",にゃ:"nya",にゅ:"nyu",にょ:"nyo",ひゃ:"hya",ひゅ:"hyu",ひょ:"hyo",みゃ:"mya",みゅ:"myu",みょ:"myo",りゃ:"rya",りゅ:"ryu",りょ:"ryo",ぎゃ:"gya",ぎゅ:"gyu",ぎょ:"gyo",じゃ:"ja",じゅ:"ju",じょ:"jo",びゃ:"bya",びゅ:"byu",びょ:"byo",ぴゃ:"pya",ぴゅ:"pyu",ぴょ:"pyo",
あ:"a",い:"i",う:"u",え:"e",お:"o",か:"ka",き:"ki",く:"ku",け:"ke",こ:"ko",さ:"sa",し:"shi",す:"su",せ:"se",そ:"so",た:"ta",ち:"chi",つ:"tsu",て:"te",と:"to",な:"na",に:"ni",ぬ:"nu",ね:"ne",の:"no",は:"ha",ひ:"hi",ふ:"fu",へ:"he",ほ:"ho",ま:"ma",み:"mi",む:"mu",め:"me",も:"mo",や:"ya",ゆ:"yu",よ:"yo",ら:"ra",り:"ri",る:"ru",れ:"re",ろ:"ro",わ:"wa",を:"o",ん:"n",が:"ga",ぎ:"gi",ぐ:"gu",げ:"ge",ご:"go",ざ:"za",じ:"ji",ず:"zu",ぜ:"ze",ぞ:"zo",だ:"da",ぢ:"ji",づ:"zu",で:"de",ど:"do",ば:"ba",び:"bi",ぶ:"bu",べ:"be",ぼ:"bo",ぱ:"pa",ぴ:"pi",ぷ:"pu",ぺ:"pe",ぽ:"po",ー:"-",ぁ:"a",ぃ:"i",ぅ:"u",ぇ:"e",ぉ:"o"};
function kana2roma(s){
  // katakana→hiragana first
  s=(s||"").replace(/[ァ-ヶ]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60));
  let out="",i=0;
  while(i<s.length){
    if(s[i]==="っ"){const nxt=ROMA[s.substr(i+1,2)]||ROMA[s[i+1]]||"";out+=nxt.charAt(0);i++;continue}
    const two=ROMA[s.substr(i,2)];
    if(two){out+=two;i+=2;continue}
    out+=ROMA[s[i]]||s[i];i++;
  }
  return out.replace(/-/g,"");
}
function jpDisp(v){ // v = vocab row; render per script setting
  const mode=store.script||"jp";
  if(mode==="romaji")return kana2roma(v[1]);
  if(mode==="both")return v[0]+" ("+kana2roma(v[1])+")";
  return v[0];
}

  </div>`;

function recSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const out=document.getElementById("recOut");
  if(!SR){out.textContent="Speech recognition is not supported in this browser — try Chrome/Edge.";return}
  const r=new SR();r.lang="ja-JP";r.interimResults=false;
  out.textContent="Listening… speak now!";
  r.onresult=e=>{
    const heard=e.results[0][0].transcript;
    const target=SPEAK_SENTS[sIdx][0].replace(/[。、!?]/g,"");
    const match=heard.replace(/[。、]/g,"")===target;
    out.innerHTML=`Heard: <b>${heard}</b> ${match?"— ✅ perfect match!":"— keep practicing, compare with the target."}`;
  };
  r.onerror=()=>{out.textContent="Could not hear you — check mic permission."};
  r.start();
}

/* ================= WRITE ================= */
let wIdx=0,ctx=null,drawing=false;
function initCanvas(){
  const el=document.getElementById("p-write");
  if(!el.dataset.init){
    el.dataset.init="1";
    el.innerHTML=`
    <div class="card">
      <p class="center muted">Trace, then draw from memory.</p>
      <div style="position:relative;width:280px;margin:10px auto">
        <div class="writeRef" id="wRef" style="position:absolute;inset:0;pointer-events:none;color:#e9dfe2"></div>
        <canvas id="wCan" width="280" height="280" style="position:relative;background:transparent;border:2px dashed #e6c3cb;border-radius:12px"></canvas>
      </div>
      <p class="center" id="wInfo" style="margin-top:6px"></p>
      <div class="btnrow">
        <button class="b" onclick="wClear()">🧹 Clear</button>
        <button class="b" onclick="wTrace=!wTrace;wShow()">👁 Toggle guide</button>
        <button class="b" onclick="speakJa(WSET[wIdx][0])">🔊</button>
        <button class="b" onclick="wIdx=(wIdx-1+WSET.length)%WSET.length;wShow()">← Prev</button>
        <button class="b" onclick="wIdx=(wIdx+1)%WSET.length;wShow()">Next →</button>
      </div>
    </div>`;
    const c=document.getElementById("wCan");ctx=c.getContext("2d");
    ctx.lineWidth=8;ctx.lineCap="round";ctx.strokeStyle="#4dd0e1";
    const pos=e=>{const r=c.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return[t.clientX-r.left,t.clientY-r.top]};
    const start=e=>{drawing=true;const[x,y]=pos(e);ctx.beginPath();ctx.moveTo(x,y);e.preventDefault()};
    const move=e=>{if(!drawing)return;const[x,y]=pos(e);ctx.lineTo(x,y);ctx.stroke();e.preventDefault()};
    const end=()=>{drawing=false};
    c.addEventListener("mousedown",start);c.addEventListener("mousemove",move);window.addEventListener("mouseup",end);
    c.addEventListener("touchstart",start);c.addEventListener("touchmove",move);c.addEventListener("touchend",end);
  }
  wShow();
}
let wTrace=true;
const WSET=KANJI.concat(KANJI4);
function wShow(){
  const k=WSET[wIdx];
  document.getElementById("wRef").textContent=wTrace?k[0]:"";
  document.getElementById("wRef").style.color="#e9dfe2";
  document.getElementById("wInfo").innerHTML=`<b>${k[0]}</b> — ${k[3]} <span class="muted">(on: ${k[1]} / kun: ${k[2]})</span>`;
  wClear();
}
function wClear(){if(ctx)ctx.clearRect(0,0,280,280)}
